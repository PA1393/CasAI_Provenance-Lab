# Render Blueprint for the CasAI Provenance Lab backend.
# Deploy: Render Dashboard → New → Blueprint → point at this repo.
# Secrets (OPENAI_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_KEY, CORS_ORIGIN) are
# marked `sync: false`, so you set them once in the Render dashboard — they are
# NEVER stored in this repo. This is how the demo uses your OpenAI tokens on the
# server without exposing the key to users or GitHub.

services:
  - type: web
    name: casai-provenance-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # Set these in the Render dashboard (kept out of the repo):
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Frontend origin allowed by CORS, e.g. https://your-frontend.vercel.app
      - key: CORS_ORIGIN
        sync: false
      # Optional model override (defaults to gpt-4o-mini in code):
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
